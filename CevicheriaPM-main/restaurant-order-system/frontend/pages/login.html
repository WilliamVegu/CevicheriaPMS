<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Meseros</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <header class="login-header">
                <h1>Acceso al Sistema</h1>
                <p class="login-subtitle">Gestión de Pedidos – Personal Autorizado</p>
            </header>

            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese su usuario" autocomplete="off"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña"
                        autocomplete="new-password" required>
                </div>

                <button type="submit" class="btn-primary">
                    Iniciar Sesión
                </button>

                <button type="button" class="btn-secondary" onclick="showRecoveryModal()">
                    Recuperar Contraseña
                </button>
            </form>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>

        <!-- MODAL DE RECUPERACIÓN DE CONTRASEÑA -->
        <div class="login-card recovery-card" id="recoveryCard" style="display: none;">
            <header class="login-header">
                <h1>Recuperar Contraseña</h1>
                <p class="login-subtitle">Verificación de Identidad</p>
            </header>

            <!-- Ingresar usuario y código de empleado -->
            <form id="verifyEmployeeForm" class="login-form" style="display: block;">
                <div class="form-group">
                    <label for="recoveryUsername">Usuario</label>
                    <input type="text" id="recoveryUsername" name="recoveryUsername" placeholder="Ingrese su usuario"
                        required>
                </div>

                <div class="form-group">
                    <label for="employeeCode">Código de Empleado</label>
                    <input type="text" id="employeeCode" name="employeeCode" placeholder="Ingrese su código de empleado"
                        maxlength="10" required>
                    <small class="form-hint">Consulte su código con el administrador</small>
                </div>

                <button type="submit" class="btn-identify">
                    Verificar Identidad
                </button>

                <button type="button" class="btn-return" onclick="showLoginModal()">
                    Volver al Login
                </button>
            </form>

            <!-- Cambiar contraseña (se muestra después de verificar) -->
            <form id="changePasswordForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">Nueva Contraseña</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Ingrese nueva contraseña"
                        minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Confirme su nueva contraseña" minlength="6" required>
                </div>

                <div class="password-strength" id="passwordStrength"></div>

                <button type="submit" class="btn-primary">
                    Cambiar Contraseña
                </button>

                <button type="button" class="btn-secondary" onclick="cancelRecovery()">
                    Cancelar
                </button>
            </form>

            <div id="recoveryMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/password-recovery.js"></script>
</body>

</html>
