<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Sistema de Cevicheria</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="profile-info">
            <div class="profile-avatar" id="profileAvatar">🍳</div>
            <div class="profile-details">
                <h1 id="cocinaUser">Cocinero</h1>
                <p>Personal de Cocina</p>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Salir</button>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="kitchen-container">
        <div class="kitchen-title-section">
            <h2 class="kitchen-title">👨‍🍳 Comandas Activas en Cocina</h2>
            <button class="btn-secondary" onclick="loadActiveOrders()" style="width: auto; margin: 0; padding: 8px 16px; font-size: 14px;">
                🔄 Actualizar
            </button>
        </div>

        <!-- GRID DE COMANDAS -->
        <div class="kitchen-grid" id="kitchenGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">
                <h3>Cargando pedidos de cocina...</h3>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/cocina.js"></script>
</body>

</html>
